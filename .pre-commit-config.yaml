repos:
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        args: [--target-version=py310]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        additional_dependencies: ["flake8-annotations==3.0.1"]
        args:
          [
            --select,
            W191 W291 W293 W391 E115 E117 E122 E124 E125 E225 E231 E301 E303 E501 F401 F403 N801 N802 N803 N804 N805 N806,
            --count,
            --statistics,
            --max-complexity,
            "10",
            --max-line-length,
            "100",
            --extend-ignore,
            E203,
            ansys,
            codegen,
            doc,
            examples,
            tests,
          ]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        args: ["--toml", "pyproject.toml"]
        additional_dependencies: ["tomli"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
        exclude: ".(def|gtm|res)$|session.rst"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml

  - repo: https://github.com/PyCQA/pylint
    rev: v3.1.0
    hooks:
      - id: pylint
        args: ["--reports", "n", "--score", "n", "--rcfile=pylintrc"]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.1.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  - repo: https://github.com/ansys/pre-commit-hooks
    rev: v0.5.2
    hooks:
      - id: add-license-headers
        files: '(src|examples|tests|codegen)/.*\.(py)'
        args: [--start_year=2023]
